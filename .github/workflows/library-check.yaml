name: Library Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with Ruff
        # Runs both 'check' (rules) and 'format' (style)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type Check with Mypy
        run: uv run mypy src

      - name: Run Tests
        run: uv run pytest

      - name: Verify Build
        run: |
          uv build
          uv run python -m zipfile --list dist/*.whl | grep "py.typed"
