name: Library Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Check if uv.lock is out of sync
        # This will fail the CI immediately if pyproject.toml and uv.lock don't match
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Run all checks via pre-commit
        run: uv run pre-commit run --all-files

      - name: Run Tests
        run: uv run pytest

      - name: Verify Build
        run: |
          uv build
          uv run python -m zipfile --list dist/*.whl | grep "py.typed"
